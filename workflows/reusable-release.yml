name: Reusable Release

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name (e.g. kubix-schema)"
        type: string
        required: true
      language:
        description: "Language: go or node"
        type: string
        default: "go"
      go-version:
        description: "Go version (if language is go)"
        type: string
        default: "1.22"
      working-directory:
        description: "Working directory"
        type: string
        default: "."

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/kubixhq/${{ inputs.image-name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.working-directory }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Go binaries
        if: inputs.language == 'go'
        working-directory: ${{ inputs.working-directory }}
        run: |
          mkdir -p dist
          GOOS=linux   GOARCH=amd64 go build -o dist/${{ inputs.image-name }}-linux-amd64   ./cmd/server
          GOOS=linux   GOARCH=arm64 go build -o dist/${{ inputs.image-name }}-linux-arm64   ./cmd/server
          GOOS=darwin  GOARCH=amd64 go build -o dist/${{ inputs.image-name }}-darwin-amd64  ./cmd/server
          GOOS=darwin  GOARCH=arm64 go build -o dist/${{ inputs.image-name }}-darwin-arm64  ./cmd/server
          GOOS=windows GOARCH=amd64 go build -o dist/${{ inputs.image-name }}-windows-amd64.exe ./cmd/server

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --latest --strip header
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.content }}
          files: |
            ${{ inputs.working-directory }}/dist/*
          generate_release_notes: true
